name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # 只在目标平台跑:macOS 用 sips、Windows 用 System.Drawing 转码图片;
    # Windows job 会真的执行 transcodeWin,等于在真 Windows 上验证图片这条链。
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Run tests (zero deps)
        run: node --test
